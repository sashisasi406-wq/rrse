<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Search</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --r: #4285F4; --o: #EA4335; --c: #FBBC05; --k: #4285F4; --e: #34A853; --t: #EA4335; }
        body { margin: 0; font-family: 'Arial', sans-serif; background: white; transition: background 0.3s; }
        
        #wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; transition: all 0.4s ease-in-out; }
        #wrapper.results-mode { justify-content: flex-start; padding-top: 30px; }

        .logo { font-size: 90px; font-weight: bold; margin-bottom: 30px; letter-spacing: -2px; transition: all 0.4s; }
        .results-mode .logo { font-size: 32px; margin-bottom: 15px; }

        .search-container { width: 100%; max-width: 584px; text-align: center; position: relative; }
        .search-bar { width: 100%; padding: 13px 25px; font-size: 16px; border: 1px solid #dfe1e5; border-radius: 24px; outline: none; box-sizing: border-box; }
        .search-bar:focus { box-shadow: 0 1px 6px rgba(32,33,36,0.28); }

        /* Game Result Cards */
        #game-results { display: none; width: 100%; max-width: 650px; margin-top: 40px; text-align: left; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .game-card { display: flex; align-items: center; padding: 20px; border: 1px solid #dadce0; border-radius: 8px; margin-bottom: 15px; cursor: pointer; transition: background 0.2s; }
        .game-card:hover { background: #f8f9fa; border-color: var(--r); }
        .game-icon { font-size: 40px; margin-right: 20px; background: #f1f3f4; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .game-info h3 { margin: 0; color: #1a0dab; font-size: 20px; }
        .game-info p { margin: 5px 0 0; color: #4d5156; font-size: 14px; line-height: 1.4; }

        .button-group { margin-top: 28px; }
        .results-mode .button-group { display: none; }
        button { background: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 4px; padding: 10px 20px; cursor: pointer; color: #3c4043; }

        /* Calculator Styles */
        #calc-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1000; width: 320px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
    </style>
</head>
<body>

    <div id="wrapper">
        <div class="logo">
            <span style="color:var(--r)">R</span><span style="color:var(--o)">o</span><span style="color:var(--c)">c</span><span style="color:var(--k)">k</span><span style="color:var(--e)">e</span><span style="color:var(--t)">t</span>
        </div>

        <div class="search-container">
            <input type="text" id="main-search" class="search-bar" autofocus>
            <div class="button-group">
                <button onclick="handleSearch()">Rocket Search</button>
                <button onclick="handleSearch()">I'm Feeling Lucky</button>
            </div>
        </div>

        <div id="game-results">
            <p style="color:#70757a; font-size: 14px; margin-left: 10px;">Showing results for: <b>Games</b></p>
            
            <div class="game-card" onclick="window.location.href='runner.html'">
                <div class="game-icon">🏔️</div>
                <div class="game-info">
                    <h3>Mountain Runner (Standard)</h3>
                    <p>Survive the snowy peaks. Jump over obstacles and track your distance score.</p>
                </div>
            </div>

            <div class="game-card" onclick="window.location.href='backflip.html'">
                <div class="game-icon">🔄</div>
                <div class="game-info">
                    <h3>Backflip Pro Runner</h3>
                    <p>Extreme mode: Hold space to perform 360-degree flips for 500 bonus points.</p>
                </div>
            </div>

            <button onclick="location.reload()" style="background:none; border:none; color:var(--r); text-decoration:underline; font-size:14px; cursor:pointer;">Clear search results</button>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleCalc()"></div>
    <div id="calc-modal">
        <h3 style="margin-top:0">Rocket Calculator</h3>
        <input type="number" id="num1" style="width:100%; margin:5px 0;">
        <input type="number" id="num2" style="width:100%; margin:5px 0;">
        <select id="op" style="width:100%; margin:5px 0;">
            <option value="1">Add (+)</option><option value="2">Sub (-)</option>
            <option value="3">Mult (×)</option><option value="4">Div (÷)</option>
        </select>
        <button style="width:100%; background:var(--r); color:white; border:none; margin-top:10px;" py-click="calculate">Calculate</button>
        <div id="result-display" style="text-align:center; padding-top:15px; font-weight:bold; color:var(--r);"></div>
    </div>

    <script type="py">
from pyscript import document
def calculate(event):
    n1, n2 = document.querySelector("#num1").value, document.querySelector("#num2").value
    op = document.querySelector("#op").value
    out = document.querySelector("#result-display")
    if not n1 or not n2: return
    v1, v2 = float(n1), float(n2)
    if op=='1': r = v1+v2
    elif op=='2': r = v1-v2
    elif op=='3': r = v1*v2
    elif op=='4': r = v1/v2 if v2!=0 else "Div Error"
    out.innerText = f"Result: {r}"
    </script>

    <script>
        function handleSearch() {
            const query = document.getElementById("main-search").value.toLowerCase().trim();
            const wrapper = document.getElementById("wrapper");
            const gameDisplay = document.getElementById("game-results");

            // INTERNAL COMMANDS
            if (query === "game" || query === "games") {
                wrapper.classList.add("results-mode");
                gameDisplay.style.display = "block";
            } 
            else if (query === "calc" || query === "calculator") {
                toggleCalc();
            } 
            else if (query === "archive" || query === "rise") {
                window.location.href = "archive.html";
            }
            // EXTERNAL REDIRECT (Only if it's not a command)
            else if (query !== "") {
                window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(query);
            }
        }

        document.getElementById("main-search").addEventListener("keypress", (e) => {
            if (e.key === "Enter") handleSearch();
        });

        function toggleCalc() {
            const m = document.getElementById('calc-modal');
            const o = document.getElementById('overlay');
            const vis = m.style.display === 'block';
            m.style.display = vis ? 'none' : 'block';
            o.style.display = vis ? 'none' : 'block';
            if(!vis) document.getElementById("main-search").value = "";
        }
    </script>
</body>
</html>
