<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Search</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: -50px; }
        .logo { font-size: 90px; font-weight: bold; margin-bottom: 30px; letter-spacing: -2px; }
        .r { color: #4285F4; } .o { color: #EA4335; } .c { color: #FBBC05; } .k { color: #4285F4; } .e { color: #34A853; } .t { color: #EA4335; }
        .search-container { width: 100%; max-width: 584px; }
        .search-bar { width: 100%; padding: 13px 25px; font-size: 16px; border: 1px solid #dfe1e5; border-radius: 24px; outline: none; box-sizing: border-box; transition: box-shadow 0.2s; }
        .search-bar:hover, .search-bar:focus { box-shadow: 0 1px 6px rgba(32,33,36,0.28); border-color: rgba(0,0,0,0); }
        .button-group { margin-top: 28px; }
        button { background-color: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 4px; color: #3c4043; font-size: 14px; padding: 0 20px; height: 36px; cursor: pointer; }
        button:hover { border: 1px solid #dadce0; box-shadow: 0 1px 1px rgba(0,0,0,0.1); color: #202124; }
        footer { background-color: #f2f2f2; color: #70757a; font-size: 14px; }
        .footer-content { display: flex; justify-content: space-between; padding: 15px 30px; border-top: 1px solid #dadce0; }
        .footer-links { display: flex; gap: 25px; }
        .footer-links a, .footer-links span { text-decoration: none; color: #70757a; cursor: pointer; }

        /* Calculator Modal Styles */
        #calc-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1000; width: 320px; }
        #calc-modal input, #calc-modal select { width: 100%; margin: 10px 0; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        #result-display { margin-top: 15px; font-weight: bold; text-align: center; color: #4285F4; min-height: 20px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
    </style>
</head>
<body>

    <main>
        <div class="logo">
            <span class="r">R</span><span class="o">o</span><span class="c">c</span><span class="k">k</span><span class="e">e</span><span class="t">t</span>
        </div>
        <div class="search-container">
            <input type="text" id="main-search" class="search-bar" autofocus placeholder="Type 'archive' or search the web">
        </div>
        <div class="button-group">
            <button onclick="handleSearch()">Rocket Search</button>
            <button onclick="toggleCalc()">Open Calculator</button>
        </div>
    </main>

    <div class="overlay" id="overlay" onclick="toggleCalc()"></div>
    <div id="calc-modal">
        <h3 style="margin-top:0">Rocket Calculator</h3>
        <input type="number" id="num1" placeholder="First Number">
        <input type="number" id="num2" placeholder="Second Number">
        <select id="op">
            <option value="1">Addition</option>
            <option value="2">Subtraction</option>
            <option value="3">Multiplication</option>
            <option value="4">Division</option>
        </select>
        <button style="width:100%; background:#4285F4; color:white;" py-click="calculate">Calculate</button>
        <div id="result-display"></div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="#">About</a>
                <a href="archive.html">Archive Node</a>
            </div>
            <div class="footer-links">
                <span onclick="toggleCalc()">Calculator (Python)</span>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
            </div>
        </div>
    </footer>

    <script type="py">
from pyscript import document

def calculate(event):
    n1 = document.querySelector("#num1").value
    n2 = document.querySelector("#num2").value
    choice = document.querySelector("#op").value
    out = document.querySelector("#result-display")

    if not n1 or not n2:
        out.innerText = "Enter numbers first!"
        return

    num1, num2 = float(n1), float(n2)

    if choice == '1':
        res = f"Total: {num1 + num2}"
    elif choice == '2':
        res = f"Difference: {num1 - num2}"
    elif choice == '3':
        res = f"Product: {num1 * num2}" 
    elif choice == '4':
        res = f"Quotient: {num1 / num2}" if num2 != 0 else "Cannot divide by zero!"
    
    out.innerText = res
    </script>

    <script>
        // REDIRECT LOGIC
        function handleSearch() {
            const input = document.getElementById("main-search").value.toLowerCase().trim();
            
            if (input === "archive" || input === "rise" || input === "data") {
                window.location.href = "archive.html";
            } else if (input !== "") {
                window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(input);
            }
        }

        // ENTER KEY LISTENER
        document.getElementById("main-search").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                handleSearch();
            }
        });

        function toggleCalc() {
            const modal = document.getElementById('calc-modal');
            const overlay = document.getElementById('overlay');
            const isVisible = modal.style.display === 'block';
            modal.style.display = isVisible ? 'none' : 'block';
            overlay.style.display = isVisible ? 'none' : 'block';
        }
    </script>
</body>
</html>
